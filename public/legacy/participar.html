<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de participación</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="participar-page">
  <main class="container">
    <div class="card">
      <h1 class="card-title">Formulario de participación</h1>
      <p class="help-text">Completa tus datos para validar tu ticket y entrar al sorteo.</p>
      <form id="participar-form" class="form-field">
        <label for="recibo">Número de recibo</label>
        <input type="text" id="recibo" name="recibo" readonly />

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="tucorreo@example.com" required />

        <label for="telefono">Teléfono / Celular</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej. 3001234567" required />

        <button type="submit">Enviar participación</button>
      </form>
      <div id="mensaje" class="status-card" style="display:none;"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
